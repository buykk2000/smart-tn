<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>SMART TN System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    margin-bottom: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.result {
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 12px;
}

.badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 8px;
    margin-top: 5px;
}

.red { background: #ff4d4d; }
.green { background: #28a745; }
.blue { background: #007bff; }
</style>
</head>

<body>

<div class="container">

<h1>🚀 SMART TN SYSTEM</h1>

<div class="card">
<div class="grid">

<div>
<label>Ачааны төрөл</label>
<select id="type">
<option>Экскаватор</option>
<option>Бульдозер</option>
<option>Кран</option>
</select>

<label>Урт (м)</label>
<input id="L" type="number">

<label>Өргөн (м)</label>
<input id="W" type="number">
</div>

<div>
<label>Өндөр (м)</label>
<input id="H" type="number">

<label>Жин (тн)</label>
<input id="m" type="number">
</div>

</div>

<button onclick="calculate()">⚙ ТООЦОО ХИЙХ</button>
</div>

<div class="card result" id="output">
👉 Үр дүн энд гарна
</div>

</div>

<script>
function calculate(){

let L = parseFloat(document.getElementById("L").value);
let W = parseFloat(document.getElementById("W").value);
let H = parseFloat(document.getElementById("H").value);
let m = parseFloat(document.getElementById("m").value);

let a = 1.5;
let k = 1.5;

let status = (W > 3.25) ? "Овор ихтэй" : "Энгийн";

let level = "";
if(W <= 3.25) level="Энгийн";
else if(W <=4) level="I зэрэг";
else if(W <=5) level="II зэрэг";
else level="III зэрэг";

let F = m * a * k;
let chains = Math.ceil(F / 10);

let wagon = "";
if(m <=25) wagon="Платформ вагон";
else if(m <=60) wagon="Хүнд даацын вагон";
else wagon="Тусгай вагон";

let color = (W > 3.25) ? "red" : "green";

document.getElementById("output").innerHTML = `
<h2>📊 ҮР ДҮН</h2>

Габарит: <span class="badge ${color}">${status}</span><br>
Зэрэглэл: <span class="badge blue">${level}</span><br><br>

Хүч: <b>${F.toFixed(2)}</b><br>
Гинж: <b>${chains}</b><br>
Вагон: <b>${wagon}</b><br><br>

<h3>📄 ТЕХНИКИЙН НӨХЦӨЛ</h3>
Хэмжээ: ${L} x ${W} x ${H} м<br>
Жин: ${m} тн<br>
Бэхэлгээ: ${chains} гинж<br>
Вагон: ${wagon}
`;
}
</script>

</body>
</html>
